services:
  - type: web
    name: apk-so-injector
    env: python
    buildCommand: bash build.sh
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 600 --workers 2
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: apk-work
      mountPath: /tmp/apk_jobs
      sizeGB: 10
